version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pitchpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pitchpulse
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-pitchpulse-demo}
      - PROVIDER_API_KEY=${PROVIDER_API_KEY:-demo-key}
      - USE_DEMO_DATA=${USE_DEMO_DATA:-True}
      - VECTOR_DB_URL=${VECTOR_DB_URL:-}
      - VECTOR_DB_TOKEN=${VECTOR_DB_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db
    # We use volume mapping for hot-reload during dev
    volumes:
      - .:/app

volumes:
  postgres_data:
